<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 240px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #15202b; color: #f7f9f9; margin: 0; }
    body > div { padding: 12px 0; border-bottom: 1px solid #2f3336; }
    body > div:last-of-type { border-bottom: none; }
    label { cursor: pointer; display: flex; align-items: center; justify-content: space-between; flex-direction: row-reverse; font-size: 14px; font-weight: 500; user-select: none; margin: 0; }
    input[type="checkbox"] { appearance: none; width: 40px; height: 20px; background: #3e4144; border-radius: 20px; position: relative; cursor: pointer; outline: none; transition: background 0.2s ease-in-out; margin: 0; }
    input[type="checkbox"]::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform 0.2s ease-in-out; }
    input[type="checkbox"]:checked { background: #1d9bf0; }
    input[type="checkbox"]:checked::after { transform: translateX(20px); }
  </style>
</head>
<body>
  <h1 style="text-align: center; font-size: 30px; margin: 0 0 4px 0; padding-bottom: 16px; border-bottom: 1px solid #2f3336; font-weight: 600; letter-spacing: 1px;">FuckX</h1>
  <div><label><input type="checkbox" id="ads"> Hide Ads</label></div>
  <div><label><input type="checkbox" id="navPremium"> Hide Premium</label></div>
  <div><label><input type="checkbox" id="navCreator"> Hide Creator Studio</label></div>
  <div><label><input type="checkbox" id="navGrok"> Hide Grok</label></div>
  <div><label><input type="checkbox" id="promos"> Hide Promos</label></div>
  <div><label><input type="checkbox" id="whoToFollow"> Hide Who to Follow</label></div>
  <div><label><input type="checkbox" id="news"> Hide Today's News</label></div>
  <div><label><input type="checkbox" id="trends"> Hide What's Happening</label></div>
  <div><label><input type="checkbox" id="relevant"> Hide Relevant People</label></div>
  <div><label><input type="checkbox" id="mightLike"> Hide You Might Like</label></div>
  <div><label><input type="checkbox" id="live"> Hide Live on X</label></div>
  <div><label><input type="checkbox" id="blueCheckMuter"> Mute Blue Checks</label></div>
  <div><label><input type="checkbox" id="hideMetrics"> Hide Metrics</label></div>
  <div>
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <span id="toggle-birdLogo" style="cursor: pointer; font-size: 14px; font-weight: 500; user-select: none;">▶ Restore Bird Logo</span>
      <label style="width: min-content;"><input type="checkbox" id="birdLogo"></label>
    </div>
    <div id="birdLogoOptions" style="display: none; padding-left: 20px; border-bottom: none; padding-top: 12px;">
      
      <div style="padding: 6px 0; border-bottom: none;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <span id="toggle-tabLogo" style="cursor: pointer; font-size: 14px; font-weight: 500; user-select: none;">▶ Tab Logo</span>
          <label style="width: min-content;"><input type="checkbox" id="tabLogoEnabled"></label>
        </div>
      </div>
      <div id="tabLogoOptions" style="display: none; padding-left: 20px; padding-bottom: 6px; border-bottom: none;">
        <label><input type="checkbox" id="tabLogoBlue"> White / Blue</label>
      </div>
      
      <div style="padding: 6px 0; border-bottom: none;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <span id="toggle-pageLogo" style="cursor: pointer; font-size: 14px; font-weight: 500; user-select: none;">▶ Page Logo</span>
          <label style="width: min-content;"><input type="checkbox" id="pageLogoEnabled"></label>
        </div>
      </div>
      <div id="pageLogoOptions" style="display: none; padding-left: 20px; padding-bottom: 6px; border-bottom: none;">
        <label><input type="checkbox" id="pageLogoBlue"> White / Blue</label>
      </div>
      
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
